<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1" />
    <title>Editar Produtos</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous"/>
</head>
<body>
    <div class="container">
        <h1>Editar Comidas</h1>
        <form action="#" th:action="@{/food/save}" th:object="${food}" method="POST">

            <!-- Campo necessário para que o save saiba que não estamos criando, mas editando um produto -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group row mb-3">
                <label for="name" class="col-sm-2 col-form-label">Nome</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" id="name" name="name" th:field="*{name}" placeholder="Ex: Lasanha à Bolonhesa" required>
                </div>
            </div>
            
            <div class="form-group row mb-3">
                <label for="description" class="col-sm-2 col-form-label">Descrição</label>
                <div class="col-sm-10">
                    <textarea class="form-control" id="description" name="description" th:field="*{description}" rows="3" placeholder="Ingredientes e detalhes da comida..." required></textarea>
                </div>
            </div>

            <div class="form-group row mb-3">
                <label for="kcal" class="col-sm-2 col-form-label">Calorias (kcal)</label>
                <div class="col-sm-10">
                    <input type="number" class="form-control" id="kcal" name="kcal" th:field="*{kcal}" placeholder="Ex: 350" required>
                </div>
            </div>

            <div class="form-group row mb-4">
                <label for="preparationTime" class="col-sm-2 col-form-label">Tempo de Preparo</label>
                <div class="col-sm-10">
                    <input type="number" class="form-control" id="preparationTime" name="preparationTime" th:field="*{preparationTime}" placeholder="Tempo em minutos (Ex: 45)" required>
                </div>
            </div>

            <div class="form-group row">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-primary">Salvar Comida</button>
                    <a href="/food" class="btn btn-secondary">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
