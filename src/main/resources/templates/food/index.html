<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <th:block
    th:replace="~{/../fragments/head :: head('Listar Comida')}"
  ></th:block>
  <body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container">
      <h1>Listagem de Comida</h1>
      <table class="table table-striped">
        <thead>
          <tr>
            <th scope="col">Nome</th>
            <th scope="col">Descrição</th>
            <th scope="col">Kcal</th>
            <th scope="col">Tempo de Preparo</th>
            <th scope="col">Excluir</th>
            <th scope="col">Editar</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="food : ${foodsList}">
            <td scope="row" th:text="${food.name}"></td>
            <td scope="row" th:text="${food.description}"></td>
            <td scope="row" th:text="${food.kcal}"></td>
            <td scope="row" th:text="${food.preparationTime}"></td>
            <td>
              <a th:href="@{/food/edit/{id}(id=${food.id})}">Editar</a>
            </td>
            <td>
              <a th:href="@{/food/delete/{id}(id=${food.id})}">Deletar</a>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="row">
        <a th:href="@{/food/create}">
          <button sec:authorize="hasAuthority('Admin')" class="btn btn-primary">Cadastrar Comida</button>
        </a>
      </div>
    </div>
	<th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
  </body>
</html>
